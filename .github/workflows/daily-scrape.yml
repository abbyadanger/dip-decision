name: Daily Lake Michigan Temperature Scrape

on:
  schedule:
    - cron: '0 15 * * *'  # Runs daily at 10:00 AM CDT (15:00 UTC)
    - cron: '0 17 * * *'  # Runs daily at 12:00 PM CDT (17:00 UTC)
    - cron: '0 20 * * *'  # Runs daily at 3:00 PM CDT (20:00 UTC)
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}
        run: node --input-type=module < scripts/scrape.js
